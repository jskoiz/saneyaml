name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".cargo/**"
      - ".gitattributes"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/ci.yml"
      - "CHANGELOG.md"
      - "Cargo.lock"
      - "Cargo.toml"
      - "CONTRIBUTING.md"
      - "LICENSE.md"
      - "README.md"
      - "SECURITY.md"
      - "benches/**"
      - "build.rs"
      - "deny.toml"
      - "docs/**"
      - "examples/**"
      - "fuzz/**"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".cargo/**"
      - ".gitattributes"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/ci.yml"
      - "CHANGELOG.md"
      - "Cargo.lock"
      - "Cargo.toml"
      - "CONTRIBUTING.md"
      - "LICENSE.md"
      - "README.md"
      - "SECURITY.md"
      - "benches/**"
      - "build.rs"
      - "deny.toml"
      - "docs/**"
      - "examples/**"
      - "fuzz/**"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust components
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check patch whitespace
        run: git diff --check

      - name: Run targeted proof stack
        run: |
          cargo test --locked --test serde_yaml_swap_harness
          cargo test --locked --test downstream_migration_harness
          cargo test --locked --test real_world_lossless
          cargo test --locked --test compatibility_harness --test serde_value_api --test event_parity --test tree_parity --test divergence_manifest --test divergences --test real_world_fixture_manifest --test parser_properties --test emitter --test emitter_tagged

      - name: Run full tests
        run: cargo test --locked

      - name: Run doctests
        run: cargo test --locked --doc

      - name: Check public docs
        run: RUSTDOCFLAGS='-D missing_docs' cargo doc --locked --no-deps

      - name: Check package contents
        run: cargo package --locked --allow-dirty --list >/dev/null

      - name: Run trust guard tests
        run: |
          cargo test --locked --test runtime_dependency_closure
          cargo test --locked --test trust_metadata

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run feature clippy
        run: scripts/check-feature-clippy.sh

  supply-chain:
    name: Supply-chain audit (${{ matrix.manifest }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Audit every CI-built Rust manifest, including the separate
        # non-workspace fuzz crate, which has its own dependency closure.
        manifest: ["./Cargo.toml", "./fuzz/Cargo.toml"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ${{ matrix.manifest }}
          command: check advisories bans licenses sources

  wasm:
    name: wasm32 build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Check library on wasm32
        run: cargo check --locked --target wasm32-unknown-unknown

  semver:
    name: SemVer compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check public API against the latest published release
        uses: obi1kenobi/cargo-semver-checks-action@v2

  msrv:
    name: Rust 1.88 MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        run: rustup toolchain install 1.88.0 --profile minimal

      - name: Check all targets on MSRV
        run: rustup run 1.88.0 cargo check --locked --all-targets

      - name: Test on MSRV
        run: rustup run 1.88.0 cargo test --locked

  ubuntu-release-evidence:
    name: Ubuntu release evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust components
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Install public API tooling
        run: |
          rustup toolchain install nightly --profile minimal
          cargo install cargo-public-api --version 0.52.0 --locked

      - name: Check public API snapshot
        run: scripts/check-public-api.sh

      - name: Run runtime dependency closure check
        run: cargo test --locked --test runtime_dependency_closure

      - name: Run trust metadata check
        run: cargo test --locked --test trust_metadata

      - name: Run package-alias smoke
        run: scripts/downstream-build-trials.sh smoke-only

      - name: Run fuzz target clippy
        run: cargo clippy --locked --manifest-path fuzz/Cargo.toml --all-targets -- -D warnings

      - name: Run fuzz target smoke
        run: |
          rustup toolchain install nightly --profile minimal
          cargo install cargo-fuzz --locked
          YAML_FUZZ_RUNS=1 scripts/fuzz-smoke-nonmutating.sh
