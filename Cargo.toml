[package]
name = "yaml"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Pure-Rust YAML parser, emitter, and Serde compatibility prototype for developer config files."
readme = "README.md"
license-file = "LICENSE.md"
repository = "https://github.com/jskoiz/yaml"
keywords = ["yaml", "serde", "parser", "configuration"]
categories = ["config", "encoding", "parser-implementations"]
publish = false
include = [
    "/Cargo.lock",
    "/Cargo.toml",
    "/README.md",
    "/LICENSE.md",
    "/BENCHMARKS.md",
    "/COMPATIBILITY.md",
    "/DEVELOPER_PREVIEW.md",
    "/MIGRATION.md",
    "/RELEASE_NOTES.md",
    "/examples/**",
    "/src/**",
]

[dependencies]
ryu = "1.0"
serde = "1.0"

[dev-dependencies]
proptest = "1.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9.34"
saphyr = "0.0.6"
saphyr-parser = "0.0.6"
sha2 = "0.10"
toml = "0.8"
yaml-rust2 = "0.11.0"
