[book]
title = "saneyaml"
description = "Serde-first YAML for Rust, with YAML 1.2 semantics, diagnostics, resource limits, and source-preserving edits."
authors = ["jskoiz"]
src = "docs"
language = "en"

[output.html]
git-repository-url = "https://github.com/jskoiz/saneyaml"
