[[row]]
id = "typed-serde-config"
behavior = "Typed Serde config entrypoints"
probe = "typed-serde-config"
proof = "tests/compatibility_matrix.rs typed AppConfig probe"
input = """
name: api
enabled: true
ports: [80, 443]
"""
expected_docs = 1
yaml_policy = "YAML 1.2 default typed reads preserve common config scalars."
yaml = "accept"
serde_yaml = "accept"
serde_yml = "accept"
serde_yaml_ng = "accept"
yaml_rust2 = "n/a"
saphyr = "n/a"
cross_ecosystem = []
divergence_record = "none"
migration_impact = "Serde-only Rust API row; parser-only loaders are intentionally marked n/a instead of given adapter shims."

[[row]]
