[[row]]
id = "ci-dialect-scalars"
behavior = "CI expression and script scalars"
probe = "parse-documents"
proof = "GitHub Actions, CircleCI, and Azure Pipelines synthetic scalar shapes"
input = """
github: ${{ inputs.image-tag }}
circleci: cargo-v1-{{ checksum "Cargo.lock" }}
azure: "$[eq(variables['Build.SourceBranch'], 'refs/heads/main')]"
script: |
  cargo test --locked
"""
expected_docs = 1
yaml_policy = "Treat CI expressions as plain or quoted strings under the default schema."
yaml = "accept"
serde_yaml = "accept"
serde_yml = "accept"
serde_yaml_ng = "accept"
yaml_rust2 = "accept"
saphyr = "accept"
cross_ecosystem = ["ci-dialect-scalars"]
divergence_record = "none"
migration_impact = "CI users can migrate expression-heavy config without enabling YAML 1.1 compatibility or expression-specific parsing."

[[row]]
id = "anchors-and-merge"
behavior = "Anchors, aliases, and merge keys"
probe = "parse-documents"
proof = "GitLab CI-style defaults and merge expansion fixture"
input = """
default: &default
  image: rust:1.85
lint:
  <<: *default
  script:
    - cargo fmt --all -- --check
"""
expected_docs = 1
yaml_policy = "Semantic loaders expand acyclic merge keys; raw/lossless surfaces preserve anchor and merge syntax."
yaml = "accept"
serde_yaml = "accept"
serde_yml = "accept"
serde_yaml_ng = "accept"
yaml_rust2 = "accept"
saphyr = "accept"
cross_ecosystem = ["anchors-and-merge"]
divergence_record = "tests/fixtures/divergences/records/merge-keys.toml"
migration_impact = "Graph-sensitive callers should use lossless graph APIs; semantic config callers get effective merged mappings."

