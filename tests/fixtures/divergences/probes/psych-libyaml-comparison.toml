[[case]]
id = "merge-keys"
record = "tests/fixtures/divergences/records/merge-keys.toml"
psych_status = "ok"
rust_entrypoint = "yaml11-value"
rust_status = "ok"
rust_policy = "matches-psych"
reason = "YAML 1.1 mode follows Psych/libyaml merge-edge recovery while default loading remains stricter."
yaml = '''
base: &base
  image: app:v1
  replicas: 2
service:
  <<: *base
  image: app:v2
first: &first
  shared: first
  image: app:first
  retries: 3
second: &second
  shared: second
  image: app:second
  timeout: 10
list_service:
  <<: [*first, *second]
explicit_service:
  <<: [*first, *second]
  shared: explicit
  timeout: explicit
tagged_service:
  !!merge <<: *base
  image: app:tagged
canonical_service:
  !<tag:yaml.org,2002:merge> <<: *base
  image: app:canonical
string_service:
  !!str <<: literal
  image: app:string
custom_service:
  !Thing <<: literal
  image: app:custom
scalar_merge:
  <<: scalar
  keep: value
quoted_scalar_merge:
  '<<': literal
  keep: value
tagged_scalar_merge:
  !!merge <<: literal
  keep: value
sequence_scalar_merge:
  <<: [scalar]
  keep: value
repeated_merge:
  <<: *first
  <<: *second
  keep: value
repeated_tagged_merge:
  !!merge <<: *first
  !<tag:yaml.org,2002:merge> <<: *second
  keep: value
'''
rust_contains = ["app:v2", "app:first", "app:canonical", "second", "timeout"]

