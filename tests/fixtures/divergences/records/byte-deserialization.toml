case = "byte-deserialization"
policy = "serde_yaml-style byte visitor reads"
prototype = "Byte serialization is rejected consistently across Value and document writers. Manually constructed Value-backed numeric byte sequences still deserialize to Vec<u8> through normal sequence handling. Direct deserialize_bytes and deserialize_byte_buf visitors reject plain parser-backed YAML scalars, value strings, and value sequences, matching serde_yaml's byte visitor surface rather than treating plain YAML strings as raw byte buffers. Explicit !!binary scalars are decoded for Vec<u8>, deserialize_bytes, and deserialize_byte_buf targets while retained Value and Node trees preserve the tag and base64 source text."
serde_yaml = "serde_yaml 0.9.34 serializes bytes to numeric value sequences in serde_yaml::Value and deserializes those sequences to Vec<u8>, but document writers reject bytes and direct byte visitors reject both parser-backed scalars and serde_yaml::Value sequences."
libyaml = "libyaml exposes scalar bytes at the parser layer, but it does not define Serde byte visitor behavior."
yaml_rust2_saphyr = "yaml-rust2 and saphyr expose parser/tree data rather than Serde byte visitor APIs."
decision = "Reject byte serialization across saneyaml::to_value, saneyaml::value::to_value, and document writers instead of emitting a writer-incompatible numeric sequence. Do not decode plain YAML strings as raw byte buffers. Decode explicit !!binary only for typed byte targets because it closes a YAML 1.1/libyaml compatibility gap without changing retained Value or Node trees."
migration_impact = "Migration impact: byte-oriented callers can migrate existing numeric byte sequences and explicit !!binary targets, but byte serialization and plain string byte-buffer assumptions must remain explicit."
