case = "complex-key-duplicate-policy"
policy = "duplicate key diagnostics"
prototype = "Tree loading rejects duplicate resolved scalar, sequence, and mapping keys after alias expansion. Mapping-key identity is order-insensitive, matching public yaml::Mapping equality, so {a: 1, b: 2} and {b: 2, a: 1} collide as keys. parse_events exposes duplicate keys as raw events because duplicate-key detection is a loader policy, not a parser-event policy. YAML-suite X38W is rejected in tree loading while raw alias events remain available."
libyaml = "libyaml parser events expose keys but do not by themselves impose a duplicate-key policy."
yaml_rust2_saphyr = "yaml-rust2 rejects alias-expanded duplicate sequence keys in X38W, while saphyr accepts the same fixture."
decision = "Use structural equality for untagged collection keys in tree loading, including order-insensitive mapping-key equality, to favor YAML 1.2 uniqueness and config safety. Keep the known saphyr acceptance as an ecosystem divergence, and keep parse_events permissive for parser-event fidelity."
migration_impact = "Migration impact: config callers get stricter duplicate-key protection after alias expansion; migrations from permissive loaders must treat these failures as data fixes."
