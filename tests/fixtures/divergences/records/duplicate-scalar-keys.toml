case = "duplicate-scalar-keys"
policy = "config safety duplicate scalar key rejection"
prototype = "Tree loading rejects duplicate resolved scalar mapping keys at any nesting depth and reports the duplicate span plus a related previous-key span. parse_events exposes duplicate keys as raw events because duplicate-key detection is a tree-loader policy."
serde_yaml = "serde_yaml 0.9.34 rejects duplicate scalar keys, including nested config keys such as env.FEATURE_FLAG and services.web.image."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 silently keeps the later value for duplicate scalar keys, so env.FEATURE_FLAG false then true constructs true, and services.web.image nginx then redis constructs redis. YAML 1.1 scalar resolution can also collapse on and yes to boolean true, causing last-wins key loss."
yaml_rust2_saphyr = "Collection-key duplicate behavior is recorded separately in complex-key-duplicate-policy. This record is about ordinary scalar keys in common config maps."
decision = "Keep strict duplicate scalar key rejection with spans for adoption-grade config safety. Do not add libyaml/Psych last-wins compatibility."
