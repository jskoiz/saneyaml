case = "explicit-core-tags"
policy = "Preserve explicit core tags in retained values while supporting typed reads for YAML core scalar tags"
prototype = "Preserves !!binary, !!str, !!bool, !!null, !!int, !!timestamp, and !!float as tagged nodes whose scalar payload keeps source spelling when implicit resolution would otherwise change it, including canonical tag:yaml.org,2002:* forms written verbatim or through %TAG handles. Serde typed reads coerce explicit !!int and !!float numeric targets, including !!int 0x7B, !!int 0123, !!int 1:20, !!float 1:20:30.5, and !!float .inf; explicit !!str values override implicit scalar resolution such as !!str null and !!str true; explicit !!bool and !!null typed reads construct booleans/nulls from YAML 1.1 spellings such as !!bool ON and !!null null; explicit !!timestamp values expose yaml::Timestamp; and typed byte targets decode explicit !!binary without changing retained Value or Node trees."
serde_yaml = "serde_yaml 0.9.34 drops the explicit tag metadata. In Value, !!binary and !!timestamp remain strings, !!int 0x7B becomes integer 123, !!float .inf becomes a floating-point infinity, !!str null becomes string \"null\", !!bool true becomes boolean true, and !!null null becomes null; serde_yaml rejects the YAML 1.1 spelling !!bool ON for a bool target; in BTreeMap<String, String>, source spelling is preserved for string targets."
yaml_rust2 = "yaml-rust2 0.11.0 keeps !!binary and !!timestamp as string values, reports !!int 0x7B as BadValue, and loads !!float .inf as Real(\".inf\"); explicit !!str/!!bool/!!null behavior is accepted but remains parser-specific and is covered as divergence rather than a retained-tag target."
saphyr = "saphyr 0.0.6 reports !!binary, !!int 0x7B, and !!timestamp as BadValue in the loaded tree, while !!float .inf becomes FloatingPoint(inf); explicit !!str/!!bool/!!null behavior differs from this crate's retained-tag policy."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 constructs !!binary SGVsbG8= as Hello, !!int 0x7B as integer 123, !!int 0123 as integer 83, !!int 1:20 as integer 4800, !!int 1:20.5 as float 4830.0, !!timestamp 2026-05-24 as Date, !!float .inf as Infinity, !!float 1:20:30.5 as float 4830.5, !!str null as string \"null\", !!bool ON as true, !!bool false as false, and !!null null as nil."
decision = "Keep explicit core tags as retained metadata. Support tag-aware typed Serde reads for explicit !!str, !!bool, !!null, !!int, and !!float values, with short !!* tags, verbatim tag:yaml.org,2002:* tags, and %TAG-resolved canonical core tags treated as the same core target. Include YAML 1.1 legacy radix, sexagesimal, boolean, and null forms, explicit !!timestamp yaml::Timestamp reads, and explicit !!binary byte values because this closes libyaml read-compatibility gaps without changing retained Value or Node trees."
migration_impact = "Migration impact: callers can port explicit YAML core tags without losing retained metadata, but typed reads may expose YAML 1.1 coercions that should be covered by fixture tests."
