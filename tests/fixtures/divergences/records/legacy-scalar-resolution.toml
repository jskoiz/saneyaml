case = "legacy-scalar-resolution"
policy = "YAML 1.2 core schema by default, explicit YAML 1.1 scalar construction by option"
prototype = "Default loading keeps YAML 1.1 boolean words, timestamps, sexagesimal values, hex, binary, and leading-zero octal-looking values as strings except for decimal-looking integers, decimal underscores, and YAML special floats. Explicit LoadOptions::yaml_1_1() resolves legacy booleans/nulls plus leading-zero octal, hex, binary numeric, sexagesimal, and underscored numeric forms that fit yaml::Number; timestamp-shaped plain scalars are retained as !!timestamp tagged strings, while explicit !!binary values are retained in trees and decoded for byte targets."
legacy_yaml_1_1 = "libyaml-era loaders may resolve on, yes, octal-looking numbers, sexagesimal values, timestamps, and special floats as typed scalars."
decision = "Keep default entrypoints YAML 1.2-oriented. Provide explicit YAML 1.1 scalar construction for migration call sites without automatic directive switching. Retain timestamps as tagged strings instead of adding a native date/time value, and decode explicit !!binary only for typed byte targets while preserving the tag/source in retained trees. Raw events expose scalar style before tree resolution so downstream compatibility layers can make their own schema choice."
