case = "legacy-scalar-resolution"
policy = "YAML 1.2 core schema by default, explicit YAML 1.1 scalar construction by option"
prototype = "Default loading keeps YAML 1.1 boolean words, timestamps, sexagesimal values, hex, binary, and leading-zero octal-looking values as strings except for decimal-looking integers, decimal underscores, and YAML special floats. Explicit LoadOptions::yaml_1_1() resolves legacy booleans/nulls plus leading-zero octal, hex, binary numeric, two/three-part sexagesimal int/float, and underscored numeric forms that fit yaml::Number for every document. LoadOptions::yaml_version_directive() applies that legacy construction only to documents declaring %YAML 1.1; timestamp-shaped plain scalars are retained as !!timestamp tagged strings and exposed through the native yaml::Timestamp API, while explicit !!binary values are retained in trees and decoded for byte targets."
legacy_yaml_1_1 = "libyaml-era loaders may resolve on, yes, octal-looking numbers, two/three-part sexagesimal int/float values, timestamps, and special floats as typed scalars."
decision = "Keep default entrypoints YAML 1.2-oriented. Provide explicit YAML 1.1 scalar construction for migration call sites, including an explicit directive-driven mode. Retain timestamp tag/source metadata in Value and Node while exposing matching scalars through yaml::Timestamp typed reads, and decode explicit !!binary only for typed byte targets while preserving the tag/source in retained trees. Raw events expose scalar style before tree resolution so downstream compatibility layers can make their own schema choice."
migration_impact = "Migration impact: callers porting legacy YAML 1.1 corpora must opt into yaml_1_1 or directive-driven loading and cover scalar type changes in migration tests."
