case = "legacy-scalar-resolution"
policy = "YAML 1.2 core schema by default, explicit YAML 1.1 scalar construction by option"
prototype = "Default loading keeps YAML 1.1 boolean words, timestamps, sexagesimal values, hex, binary, and leading-zero octal-looking values as strings except for decimal-looking integers, decimal underscores, and YAML special floats. Explicit LoadOptions::yaml_1_1() resolves legacy booleans/nulls plus leading-zero octal, hex, binary, sexagesimal, and underscored numeric forms that fit yaml::Number; timestamps and binary values remain strings."
legacy_yaml_1_1 = "libyaml-era loaders may resolve on, yes, octal-looking numbers, sexagesimal values, timestamps, and special floats as typed scalars."
decision = "Keep default entrypoints YAML 1.2-oriented. Provide explicit YAML 1.1 scalar construction for migration call sites without automatic directive switching, and defer timestamps/binary until the public value representation is chosen. Raw events expose scalar style before tree resolution so downstream compatibility layers can make their own schema choice."
