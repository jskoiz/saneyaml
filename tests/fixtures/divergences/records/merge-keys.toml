case = "merge-keys"
policy = "default tree merge expansion; raw event alias fidelity"
prototype = "Tree and Serde Value loading expand untagged block, flow, merge-list, and explicit !!merge / canonical tag:yaml.org,2002:merge key << forms by default after alias expansion. Nested merge sources are expanded before they are merged into aliases. For <<: [*base1, *base2], earlier merge-list mappings win for duplicate merged keys and explicit target keys override merged keys. Explicit !!str << and custom-tagged << keys remain literal. Invalid scalar/list merge payloads and repeated merge keys reject with diagnostics instead of being kept literal or applied cumulatively. parse_events remains raw and exposes << as a scalar key, explicit key tags as tag metadata, and each *anchor as an Alias event. Value::apply_merge() remains available for caller-built values and is idempotent for default-expanded parsed values."
legacy_yaml_1_1 = "Many libyaml-era config paths support merge-key expansion as a YAML 1.1 extension. Ruby Psych 3.1.0/libyaml 0.2.1 expands <<: [*base1, *base2], !!merge <<, and canonical tag:yaml.org,2002:merge << forms, keeps earlier merge-list mappings ahead of later mappings for duplicate merged keys, lets explicit target keys override merged keys, and keeps !!str/custom-tagged << keys literal. It also keeps non-mergeable scalar/list merge payloads literal and accepts repeated << keys as cumulative merge entries, with later repeated merge keys overriding duplicate merged entries while retaining non-conflicting earlier merged entries."
raw_event_decision = "Raw events expose << as the scalar key and *anchor as an Alias event. Merge expansion is a loaded-tree construction policy, not a parser-event policy."
decision = "Enable default merge-key expansion for untagged and explicit YAML merge-tag keys in loaded trees and Serde Value reads while keeping YAML 1.1 scalar construction explicit and incomplete. Preserve Value::apply_merge() for caller-built values and compatibility with existing post-load call sites. Keep strict diagnostics for invalid merge payloads and duplicate/repeated merge keys unless a later end-state API intentionally adopts Psych's permissive construction edge cases. Rust reference loaders that keep << literal are now a documented tree-shape divergence for merge fixtures."
migration_impact = "Migration impact: callers migrating from serde_yaml see parsed merge keys expanded by default instead of literal `<<`, so code inspecting raw merge syntax must use events or lossless mode."
