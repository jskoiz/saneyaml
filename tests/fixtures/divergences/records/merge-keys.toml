case = "merge-keys"
policy = "tree loader literal key; raw event alias fidelity"
prototype = "Tree loading parses block, flow, and merge-list key << forms as literal keys by default and expands alias values as ordinary cloned values, but default reads do not apply YAML 1.1 merge semantics. For <<: [*base1, *base2], the value remains a sequence of mappings and merged keys such as a/c/shared are not inserted into the target mapping unless callers opt in with yaml::Value::apply_merge(). parse_events exposes << as a scalar key and each *anchor as an Alias event."
legacy_yaml_1_1 = "Many libyaml-era config paths support merge-key expansion as a YAML 1.1 extension. Ruby Psych 3.1.0/libyaml 0.2.1 expands <<: [*base1, *base2], keeps earlier merge-list mappings ahead of later mappings for duplicate merged keys, and lets explicit target keys override merged keys."
raw_event_decision = "Raw events expose << as the scalar key and *anchor as an Alias event. Merge expansion remains out of scope for the tree loader unless a migration milestone explicitly scopes it."
decision = "Keep parser/tree/Serde Value reads literal by default to match serde_yaml/yaml-rust2/saphyr read behavior and avoid implicit YAML 1.1 semantics. Provide opt-in yaml::Value::apply_merge() for serde_yaml::Value::apply_merge-compatible read-side merge expansion; this does not change parser/tree defaults. Psych 3.1.0/libyaml 0.2.1 eager merge expansion remains a documented ecosystem divergence."
