case = "merge-keys"
policy = "default tree merge expansion; raw event alias fidelity"
prototype = "Tree and Serde Value loading, from_value, and direct owned/borrowed Value deserializers expand untagged block, flow, merge-list, and explicit !!merge / canonical tag:yaml.org,2002:merge key << forms by default after alias expansion. Nested merge sources are expanded before they are merged into aliases. For <<: [*base1, *base2], earlier merge-list mappings win for duplicate merged keys and explicit target keys override merged keys. Explicit !!str << and custom-tagged << keys remain literal. Default YAML 1.2-oriented loading keeps strict diagnostics for invalid merge payloads, duplicate local keys, duplicate/repeated merge keys, and aliases that cross document boundaries. YAML 1.1 load options adopt Psych-compatible recovery for scalar/list merge payloads, mixed valid plus non-mergeable merge-list payloads, repeated merge keys, and nested merge-list precedence while keeping duplicate local keys rejected for config safety. parse_events remains raw and exposes << as a scalar key, explicit key tags as tag metadata, and each *anchor as an Alias event. Value::apply_merge() remains available as an explicit in-place helper and is idempotent for default-expanded parsed values."
legacy_yaml_1_1 = "Many libyaml-era config paths support merge-key expansion as a YAML 1.1 extension. Ruby Psych 3.1.0/libyaml 0.2.1 expands <<: [*base1, *base2], nested merge sources, !!merge <<, and canonical tag:yaml.org,2002:merge << forms, keeps earlier merge-list mappings ahead of later mappings for duplicate merged keys, lets explicit target keys override merged keys, and keeps !!str/custom-tagged << keys literal. It also keeps non-mergeable scalar/list merge payloads literal, accepts mixed valid plus non-mergeable merge-list payloads as literal, accepts duplicate local keys with last-wins construction, rejects merge aliases that cross document boundaries, and accepts repeated << keys as cumulative merge entries, with later repeated merge keys overriding duplicate merged entries while retaining non-conflicting earlier merged entries."
raw_event_decision = "Raw events expose << as the scalar key and *anchor as an Alias event. Merge expansion is a loaded-tree construction policy, not a parser-event policy."
decision = "Enable default merge-key expansion for untagged and explicit YAML merge-tag keys in loaded trees, from_value, direct owned/borrowed Value deserializers, and Serde Value reads. Preserve Value::apply_merge() as an explicit in-place helper and compatibility with existing post-load call sites. Keep default YAML 1.2-oriented loading strict for invalid merge payloads and duplicate/repeated merge keys. Under LoadOptions::yaml_1_1() and %YAML 1.1 with LoadOptions::yaml_version_directive(), recover Psych/libyaml merge edges by keeping non-mergeable payloads literal and treating repeated real merge keys as cumulative merges where later repeated merge keys override duplicate merged entries. Rust reference loaders that keep << literal are now a documented tree-shape divergence for merge fixtures."
migration_impact = "Migration impact: callers migrating from serde_yaml see parsed and caller-built Value deserialization merge keys expanded by default instead of literal `<<`, so code inspecting raw merge syntax must use events, lossless mode, or inspect caller-built Value before deserializing."
