case = "null-like-string-targets"
policy = "Match serde_yaml for source-backed typed String reads while preserving tree and Value null semantics"
prototype = "Spanful Node-backed typed String deserialization preserves source spelling for null-like scalars when the target type is String, while saneyaml::Value and Option<T> keep null semantics."
serde_yaml = "serde_yaml 0.9.34 resolves these as Null in Value, but BTreeMap<String, String> reads EMPTY as an empty string and preserves ~, null, and NULL spelling."
yaml_rust2 = "yaml-rust2 0.11.0 resolves EMPTY, ~, and null as Null; uppercase NULL remains String(\"NULL\")."
saphyr = "saphyr 0.0.6 resolves EMPTY, ~, null, and NULL as Null."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 constructs EMPTY, ~, null, and NULL as nil."
decision = "Use raw scalar spelling only for spanful Node-backed typed String deserialization. Do not change saneyaml::Value or Option<T> null behavior."
migration_impact = "Migration impact: String-target migrations can preserve null-like source spelling from parser-backed reads, while Value and Option callers keep normal null semantics."
