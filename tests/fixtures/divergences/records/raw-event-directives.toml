case = "raw-event-directives"
policy = "raw event milestone"
prototype = "Parser accepts %YAML 1.2 and %TAG before an explicit document start, exposes directive metadata on DocumentStart events, resolves declared tag handles for the following document, ignores reserved unknown directives such as YAML-suite 6LVF, and still requires an explicit document start after any directive line."
libyaml = "libyaml exposes YAML directives through document-start event metadata and uses TAG directives to resolve tag handles."
serde_yaml = "serde_yaml 0.9.34 rejects YAML-suite 6LVF through libyaml reserved-directive handling."
yaml_rust2_saphyr = "yaml-rust2 and saphyr parser layers accept directives, ignore reserved unknown directives such as YAML-suite 6LVF, and resolve tag handles before node events; their tree loaders may not preserve the directive list itself."
decision = "Accept numeric %YAML version directives and %TAG before an explicit document start, expose directive metadata on DocumentStart, resolve declared tag handles for the following document, and ignore reserved unknown directives while retaining the explicit document-start requirement. Version directives remain syntax metadata and do not switch scalar resolution; callers must opt into legacy scalar construction with LoadOptions::yaml_1_1()."
