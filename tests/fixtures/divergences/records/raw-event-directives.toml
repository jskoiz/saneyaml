case = "raw-event-directives"
policy = "raw event milestone"
prototype = "Parser accepts %YAML 1.2 and %TAG before an explicit document start, exposes directive metadata on DocumentStart events, resolves declared tag handles for the following document, rejects duplicate TAG handles, ignores reserved unknown directives such as YAML-suite 6LVF, 2LFX, MUS6/05, and MUS6/06, and still requires an explicit document start after any directive line."
libyaml = "libyaml exposes YAML directives through document-start event metadata, uses TAG directives to resolve tag handles, rejects duplicate TAG handles, and rejects reserved unknown directives."
serde_yaml = "serde_yaml 0.9.34 rejects YAML-suite 6LVF, 2LFX, MUS6/05, and MUS6/06 through libyaml reserved-directive handling."
yaml_rust2_saphyr = "yaml-rust2 and saphyr parser layers accept directives, ignore reserved unknown directives such as YAML-suite 6LVF, 2LFX, MUS6/05, and MUS6/06, and resolve tag handles before node events; their tree loaders may not preserve the directive list itself."
decision = "Accept numeric %YAML version directives and %TAG before an explicit document start, expose directive metadata on DocumentStart, resolve declared tag handles for the following document, reject duplicate TAG handles, and ignore reserved unknown directives while retaining the explicit document-start requirement. Raw events expose directives as syntax metadata. Constructed-tree callers can opt into legacy construction globally with LoadOptions::yaml_1_1() or per %YAML 1.1 document with LoadOptions::yaml_version_directive()."
migration_impact = "Migration impact: directive-aware callers can migrate parser metadata and explicit YAML 1.1 schema selection without changing default YAML 1.2 loading; reserved-directive tests ported from libyaml remain an intentional Rust-reference divergence."
