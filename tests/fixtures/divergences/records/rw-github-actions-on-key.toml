case = "rw-github-actions-on-key"
policy = "YAML 1.2 core schema"
prototype = "`on` and `yes` are distinct string keys."
legacy_yaml_1_1 = "Ruby Psych 3.1.0/libyaml 0.2.1 resolves both `on` and `yes` as boolean true, so `on: push` and `yes: deploy` collide and the later value wins."
decision = "Keep YAML 1.2 behavior; do not add YAML 1.1 boolean aliases."
migration_impact = "Migration impact: GitHub Actions callers can migrate safely because `on` stays a string key by default; YAML 1.1 boolean mode must be opt-in and tested."
