case = "source-backed-string-targets"
policy = "Match serde_yaml for source-backed typed String keys and values while preserving tree and Value typed scalar semantics"
prototype = "saneyaml::from_str preserves raw scalar spelling for BTreeMap<String, String> keys and values when deserializing from spanful Node data, including integer-looking scalars above u128::MAX. saneyaml::Value and saneyaml::from_value remain typed/spanless and do not synthesize strings from typed scalars."
serde_yaml = "serde_yaml 0.9.34 deserializes numeric mapping keys, bool/numeric scalar values, and large integer-looking scalars into String targets using source spelling, while serde_yaml::Value may keep those scalars typed, keep forms like 1_000 and 0123 as strings, or reject integers outside its value range."
yaml_rust2 = "yaml-rust2 0.11.0 has tree behavior rather than Serde typed reads; it resolves true/FALSE as booleans, 1_000 as string, 1.5 as real, 0123 as integer 123, and ordinary config quantities as strings."
saphyr = "saphyr 0.0.6 has tree behavior rather than Serde typed reads; it resolves true as boolean, FALSE as string, 1_000 as string, 1.5 as float, 0123 as integer 123, and ordinary config quantities as strings."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 constructs true/FALSE as booleans, 1_000 as integer 1000, 1.5 as float, and 0123 as octal integer 83."
decision = "Use raw scalar spelling only for source-backed typed String deserialization from Node. Widen saneyaml::Number to i128/u128 for typed integer replacement readiness, but do not synthesize strings from typed saneyaml::Value/from_value scalars or alter Option<T> behavior."
migration_impact = "Migration impact: typed String config migrations can preserve source spelling from parser-backed reads, while Value/from_value migrations must account for typed scalar semantics."
