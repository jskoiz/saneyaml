case = "tab-token-separation"
policy = "YAML 1.2 permits tabs as separation space in selected token boundaries"
prototype = "Accepts YAML-suite 6BCT, 6CA3, Q5MG, Y79Y/001, Y79Y/010, and R4YG where tabs are used as YAML 1.2 separation space or block scalar content. Also accepts shared-reference Y79Y/002 while still rejecting tab-starting block scalar content and tab separation after block indicators where the YAML-suite marks them invalid."
