case = "tab-token-separation"
policy = "YAML 1.2 permits tabs as separation space in selected token boundaries"
prototype = "Accepts YAML-suite 6BCT, where tabs are used as token separation in a block mapping. Also accepts the tab-separation-positive Y79Y cases and YAML-suite R4YG tab-leading detected-indentation block scalar content while still rejecting tab-starting block scalar content and tab separation after block indicators where the YAML-suite marks them invalid."
serde_yaml = "serde_yaml 0.9.34 rejects YAML-suite 6BCT and R4YG through its libyaml scanner with tab-character diagnostics."
yaml_rust2 = "yaml-rust2 0.11.0 accepts YAML-suite 6BCT."
saphyr = "saphyr 0.0.6 accepts YAML-suite 6BCT."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 rejects YAML-suite 6BCT and R4YG with tab-character diagnostics."
decision = "Accept tabs only where YAML 1.2 permits separation spaces. Keep invalid tab placements rejected, and do not add a libyaml/serde_yaml compatibility bridge for this valid YAML 1.2 input."
