prototype = "Final Phase 1 accepted cases are parser/tree/Serde accepted by this crate. The first Phase 2 parity tranche promotes 5TYM, 7FWL, UGM3, K54U, and WZ62 into the included ledgers after parser/event/tree normalization proof. The next Phase 2 tranche promotes Q9WF into event parity and FH7J into shared-reference document-count parity. Later Phase 2 tightening moved explicit tagged loaded-tree deferrals to yaml-suite-tagged-tree-deferrals and empty/comment-only null-document API splits to yaml-suite-null-document-counts. This final catch-all record now covers the remaining shared-reference rejection cluster: 4ABK, 4MUZ/00, 4MUZ/01, 4MUZ/02, 7Z25, 8XYN, A2M4, DBG4, FRK4, HM87/00, HWV9, K3WX, NHX8, NJ66, NKF9, QT73, SM9W/01, VJP3/01, and W5VH."
