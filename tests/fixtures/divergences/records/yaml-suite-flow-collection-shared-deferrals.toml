decision = "Keep these flow collection cases selected as accepted while deferring shared-reference parity until the project intentionally changes the serde_yaml/libyaml compatibility policy for flow separators, plain flow scalars, empty flow nodes, or multi-line flow keys."
migration_impact = "Migration impact: callers moving flow-heavy YAML through this crate may see accepted YAML 1.2 behavior for inputs that serde_yaml/libyaml rejects, so compatibility-sensitive migrations should assert this flow-collection family explicitly."
