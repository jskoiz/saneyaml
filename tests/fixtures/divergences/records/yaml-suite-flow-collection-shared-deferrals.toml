case = "yaml-suite-flow-collection-shared-deferrals"
policy = "Keep remaining YAML-suite flow collection shared-reference deferrals grouped by flow syntax behavior instead of a final catch-all."
prototype = "YAML-suite 4ABK, 4MUZ/00, 4MUZ/01, 4MUZ/02, DBG4, FRK4, HM87/00, K3WX, NJ66, NKF9, and VJP3/01 remain accepted by this crate and covered by event/tree/Serde gates. They exercise flow mapping separators, multi-line flow keys, plain scalars inside flow collections, empty flow nodes, adjacent values after comments, and empty keys across block/flow mapping forms."
