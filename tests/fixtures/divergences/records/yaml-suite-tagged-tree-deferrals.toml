case = "yaml-suite-tagged-tree-deferrals"
policy = "Classify explicit core scalar tags through semantic explicit-core projection while keeping retained-tag source trees explicit; keep custom-tag/schema and empty-scalar tag shapes deferred."
prototype = "YAML-suite 2AUY, 33X3, 74H7, F2C7, and L94M are accepted by parser, Serde, event parity, shared-reference gates, and loaded-tree value-shape parity after stripping retained tag wrappers and applying semantic explicit-core projection to scalar source spellings. C4HZ is accepted with a custom %TAG handle, anchors, aliases, and default YAML 1.2-oriented scalar construction, so 0xFFEEBB remains a string in retained trees. FH7J is accepted and shared-reference gated, but tags on empty scalar nodes still produce a loaded-tree shape split."
serde_yaml = "serde_yaml 0.9.34/libyaml accepts these inputs for shared-reference document-count compatibility, but drops retained tag metadata and follows libyaml-era scalar construction in places where this crate preserves tag/source information."
yaml_rust2_saphyr = "yaml-rust2 0.11.0 and saphyr 0.0.6 match the promoted explicit core scalar cases after semantic explicit-core projection. For C4HZ both references construct 0xFFEEBB as an integer, while this crate keeps the default-schema string. FH7J remains a tag-on-empty-scalar tree-shape split."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 accepts the represented explicit tag and custom tag inputs, constructing values according to its YAML 1.1-era tag and scalar rules rather than retaining this crate's tagged source tree."
decision = "Promote 2AUY, 33X3, 74H7, F2C7, and L94M into loaded-tree value-shape parity under the semantic explicit-core projection used by typed reads and parity normalization. Keep C4HZ and FH7J as the remaining loaded-tree deferrals until the project intentionally changes custom-tag/schema scalar or tag-on-empty-scalar policy. Retained Node and Value trees still preserve explicit tag metadata and scalar source spellings."
migration_impact = "Migration impact: callers migrating tagged YAML can use typed reads and semantic helpers for explicit core scalar values while still relying on this crate to retain explicit tag metadata in Node and Value trees. C4HZ-like custom-tag schema scalars and FH7J-like tags on empty scalar nodes remain documented loaded-tree divergences."
