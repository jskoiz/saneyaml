case = "yaml-suite-tagged-tree-deferrals"
policy = "Keep YAML-suite tagged loaded-tree deferrals explicit until retained-tag and reference-construction policy is resolved per family."
prototype = "YAML-suite 2AUY, 33X3, 74H7, F2C7, and L94M are accepted by parser, Serde, event parity, and shared-reference gates while this crate preserves explicit core tags and source spellings in retained loaded trees. C4HZ is accepted with a custom %TAG handle, anchors, aliases, and default YAML 1.2-oriented scalar construction, so 0xFFEEBB remains a string in retained trees. FH7J is accepted and shared-reference gated, but tags on empty scalar nodes still produce a loaded-tree shape split."
serde_yaml = "serde_yaml 0.9.34/libyaml accepts these inputs for shared-reference document-count compatibility, but drops retained tag metadata and follows libyaml-era scalar construction in places where this crate preserves tag/source information."
yaml_rust2_saphyr = "yaml-rust2 0.11.0 and saphyr 0.0.6 construct several explicit core-tagged scalars as typed ints, bools, or BadValue-like loaded nodes instead of preserving this crate's retained tag/source-spelling shape. For C4HZ both references construct 0xFFEEBB as an integer, while this crate keeps the default-schema string. FH7J remains a tag-on-empty-scalar tree-shape split."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 accepts the represented explicit tag and custom tag inputs, constructing values according to its YAML 1.1-era tag and scalar rules rather than retaining this crate's tagged source tree."
decision = "Keep 2AUY, 33X3, 74H7, C4HZ, F2C7, FH7J, and L94M out of loaded-tree parity until the project intentionally changes retained-tag tree policy or narrows the parity surface for these cases. Event and shared-reference acceptance remain covered separately."
migration_impact = "Migration impact: callers migrating tagged YAML should rely on this crate retaining explicit tag metadata in Node and Value trees, and should not assume yaml-rust2, saphyr, serde_yaml, or libyaml constructed value shapes for these cases until a future compatibility policy changes."
