case = "yaml-version-directive-schema"
policy = "YAML 1.2 syntax without YAML 1.1 schema switching"
prototype = "Accepts numeric %YAML version directives such as %YAML 1.1, %YAML 1.2, and YAML-suite BEC7's %YAML 1.3 before explicit document starts as syntax metadata. The directive does not change scalar resolution; YAML 1.1 booleans, timestamps, leading-zero octal, hex, binary numeric extensions, and sexagesimal values remain strings by default. Explicit LoadOptions::yaml_1_1() is required for legacy boolean/null and supported numeric construction. YAML special floats are resolved independently of version directives."
libyaml = "libyaml exposes YAML version directives on document-start events, rejects YAML-suite BEC7's %YAML 1.3 directive, and older libyaml-era paths may use YAML 1.1 schema behavior."
yaml_rust2_saphyr = "yaml-rust2 and saphyr parser layers accept version directives including YAML-suite BEC7 as parser syntax while loaders keep crate-specific scalar resolution behavior."
decision = "Keep YAML 1.2 config-oriented scalar resolution for default entrypoints. Do not add YAML 1.1 implicit typing through version directives; callers must choose LoadOptions::yaml_1_1() explicitly."
