case = "yaml-version-directive-schema"
policy = "YAML 1.2 syntax without YAML 1.1 schema switching"
prototype = "Accepts %YAML 1.2 before explicit document starts and rejects %YAML 1.1. The directive does not change scalar resolution; YAML 1.1 booleans, timestamps, 0o/hex/binary numeric extensions, and sexagesimal values remain strings unless explicitly supported elsewhere. YAML special floats are resolved independently of version directives. Leading-zero decimal-looking integers such as 0123 parse as decimal integers rather than YAML 1.1 octal."
libyaml = "libyaml exposes YAML version directives on document-start events and older libyaml-era paths may use YAML 1.1 schema behavior."
yaml_rust2_saphyr = "yaml-rust2 and saphyr parser layers accept version directives as parser syntax while loaders keep crate-specific scalar resolution behavior."
decision = "Keep YAML 1.2 config-oriented scalar resolution. Do not add YAML 1.1 implicit typing through version directives unless a future migration milestone explicitly scopes it."
