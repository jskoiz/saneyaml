case = "yaml-version-directive-schema"
policy = "YAML 1.2 by default with explicit directive-driven YAML 1.1 loading"
prototype = "Accepts numeric %YAML version directives such as %YAML 1.1, %YAML 1.2, and YAML-suite BEC7's %YAML 1.3 before explicit document starts as syntax metadata. Default entrypoints do not change scalar resolution; YAML 1.1 booleans, timestamps, leading-zero octal, hex, binary numeric extensions, and sexagesimal values remain strings by default. LoadOptions::yaml_1_1() forces legacy construction for every document. LoadOptions::yaml_version_directive() selects legacy construction only for documents declaring %YAML 1.1; absent, %YAML 1.2, and newer numeric directives use YAML 1.2-oriented construction."
libyaml = "libyaml exposes YAML version directives on document-start events, rejects YAML-suite BEC7's %YAML 1.3 directive, and older libyaml-era paths may use YAML 1.1 schema behavior."
yaml_rust2_saphyr = "yaml-rust2 and saphyr parser layers accept version directives including YAML-suite BEC7 as parser syntax while loaders keep crate-specific scalar resolution behavior."
decision = "Keep YAML 1.2 config-oriented scalar resolution for default entrypoints. Provide a final explicit directive-driven mode with LoadOptions::yaml_version_directive() / Schema::YamlVersionDirective instead of silently changing default behavior."
