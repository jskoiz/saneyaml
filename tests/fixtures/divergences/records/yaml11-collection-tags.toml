case = "yaml11-collection-tags"
policy = "Retain YAML 1.1 collection tags in Node/Value while supporting typed Serde reads"
prototype = "Preserves explicit !!set, !!omap, and !!pairs as tagged collection nodes, including canonical tag:yaml.org,2002:* forms written verbatim or through %TAG handles. Typed Serde reads expose !!set as a sequence of mapping keys for set-like targets, expose !!omap as ordered pair sequences or as map targets that reject duplicate keys before deduping, and expose !!pairs as pair sequences without flattening duplicate keys into maps. Typed reads reject lossy malformed payloads with spans, including non-null !!set values, non-singleton !!omap entries, duplicate !!omap map-target keys, and scalar !!pairs entries."
serde_yaml = "serde_yaml 0.9.34 constructs !!set as a mapping-like value, constructs !!omap and !!pairs from sequence-of-singleton-map payloads for common Serde targets, and does not preserve tag metadata in serde_yaml::Value."
yaml_rust2 = "yaml-rust2 0.11.0 keeps the tagged collection syntax at parser/event level but its loaded tree does not provide this crate's retained-tag Value contract or typed Serde bridge."
saphyr = "saphyr 0.0.6 preserves parser/event tag information for collection nodes but does not expose this crate's typed Serde collection-tag contract."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 constructs !!set as Psych::Set, !!omap as Psych::Omap, and !!pairs as an Array of single-pair Hash entries; malformed payload recovery can keep non-null set values, collapse multi-key omap entries, or retain scalar pairs items."
decision = "Keep the public Value and Node model stable by representing YAML 1.1 collection tags as retained tagged mappings/sequences. Add tag-aware typed Serde reads instead of new Value variants: !!set feeds set-like sequence targets from mapping keys after validating null values, !!omap feeds ordered pair sequences and duplicate-checked map targets from sequence-of-singleton-maps, and !!pairs feeds pair sequences so duplicate keys are preserved. Reject malformed or lossy typed payloads instead of silently dropping, deduping, or reshaping information."
migration_impact = "Migration impact: callers porting YAML 1.1 sets, omaps, and pairs get typed Serde reads plus retained tags, but Value-shape migrations must not expect new variants. Corpora that rely on Psych's malformed collection-tag recovery should either inspect retained Value/Node tags directly or clean the input before typed reads."
