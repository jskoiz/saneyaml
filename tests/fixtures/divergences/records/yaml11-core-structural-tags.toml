case = "yaml11-core-structural-tags"
policy = "Retain YAML 1.1 core structural tags in Node/Value while keeping typed reads transparent"
prototype = "Preserves explicit !!seq, !!map, and !!value as tagged sequence, mapping, and scalar payloads, including canonical tag:yaml.org,2002:* forms written verbatim or through %TAG handles. Typed Serde reads treat !!seq as sequence targets, !!map as map/struct targets, and !!value as a scalar string value while retained Value/Node keeps the source tag. Short and %TAG-resolved !!value keys share duplicate-key identity and are rejected with spans instead of applying a last-wins mapping policy."
serde_yaml = "serde_yaml 0.9.34 constructs !!seq as sequences, !!map as mappings, and !!value = as the scalar string \"=\" but does not preserve tag metadata in serde_yaml::Value."
yaml_rust2 = "yaml-rust2 0.11.0 keeps parser/event tag information for tagged structural nodes while its loaded tree exposes ordinary arrays, hashes, and scalar values."
saphyr = "saphyr 0.0.6 preserves parser/event tag information for explicit structural tags while its loaded tree exposes ordinary arrays and hashes for !!seq and !!map; !!value handling is not this crate's retained-tag typed-read contract."
libyaml = "Ruby Psych 3.1.0/libyaml 0.2.1 constructs !!seq as Array, !!map as Hash, and !!value = as a String scalar, including canonical and %TAG-resolved spellings. Duplicate short/resolved !!value mapping keys are accepted with last value winning."
decision = "Keep core structural tags as retained metadata instead of adding new public Value variants. Deserialization should remain transparent for ordinary sequence, map, struct, and string targets while users who need tag identity can inspect TaggedValue/TaggedNode or lossless events. Keep duplicate-key safety tag-transparent for !!value keys, so equivalent short and resolved structural-tag keys collide."
migration_impact = "Migration impact: callers porting YAML 1.1 structural tags get serde_yaml-like typed reads but must inspect retained tags explicitly if they depended on tag spelling or tag identity. Inputs that rely on Psych/libyaml's last-wins duplicate !!value key recovery must be cleaned or read through an event/lossless path rather than typed tree loading."
