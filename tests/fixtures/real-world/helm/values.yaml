replicaCount: 2
image:
  repository: ghcr.io/example/app
  tag: "1.2.3"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
resources:
  requests:
    cpu: 100m
    memory: 128Mi
env:
  - name: RUST_LOG
    value: info
  - name: FEATURE_FLAG
    value: "true"
config: |
  log.level=info
  feature.enabled=true
