---
apiVersion: v1
kind: Namespace
metadata:
  name: yaml-demo
---
# Source: chart/templates/disabled-cronjob.yaml
# Rendered empty when cron.enabled=false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yaml-demo-config
data:
  application.yaml: |-
    featureFlags:
      canary: true
    quantities:
      cpu: 100m
---
apiVersion: v1
kind: Secret
metadata:
  name: yaml-demo-secret
type: Opaque
stringData:
  password: yes
  token: on
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yaml-demo
spec:
  template:
    spec:
      containers:
        - name: app
          image: ghcr.io/example/app:1.2.3
          env:
            - name: FEATURE_ENABLED
              value: "true"
            - name: LEGACY_WORD
              value: on
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
...
