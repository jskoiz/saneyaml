---
apiVersion: v1
kind: Service
metadata:
  name: yaml-demo
spec:
  selector:
    app: yaml-demo
  ports:
    - port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yaml-demo
spec:
  replicas: 2
  template:
    metadata:
      labels:
        app: yaml-demo
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - name: http
              containerPort: 80
