openapi: 3.1.0
info:
  title: Orders API
  version: "1.0.0"
paths:
  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getOrder
      tags: [orders]
      description: |-
        Returns an order with nested line items.

        Requires an authenticated caller.
      responses:
        "200":
          description: Order found
          content:
            application/json:
              examples:
                paid:
                  value:
                    id: ord_123
                    status: paid
                    total: 19.99
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Order:
      type: object
      required: [id, status, line_items]
      properties:
        status:
          type: string
          enum: [pending, paid, refunded]
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
    LineItem:
      type: object
      properties:
        quantity:
          type: integer
          default: 1
    Error:
      type: object
x-tagGroups:
  - name: Public
    tags: [orders]
